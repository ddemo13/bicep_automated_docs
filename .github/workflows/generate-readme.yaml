name: Generate Repository README

on:
  push:
    branches: [ main, develop ]
    paths:
      - '**.bicep'
      - '**.json'
      - '.github/workflows/generate-readme.yml'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-readme:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install dependencies
      run: |
        npm install -g @azure/bicep-cli
        npm install openai
        sudo apt-get update
        sudo apt-get install -y jq tree

    - name: Analyze Bicep files with AI enhancement
      id: analyze
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: |
        echo "Analyzing Bicep files with AI enhancement..."
        
        # Create analysis directory
        mkdir -p .readme-temp
        
        # Create AI analysis script
        cat > .readme-temp/ai-analyzer.js << 'EOF'
        const OpenAI = require('openai');
        const fs = require('fs');
        const path = require('path');
        
        const openai = new OpenAI({
          apiKey: process.env.OPENAI_API_KEY
        });
        
        async function analyzeBicepFile(filePath, content) {
          try {
            const prompt = `Analyze this Azure Bicep file and provide detailed documentation:
        
        File: ${filePath}
        Content:
        \`\`\`bicep
        ${content}
        \`\`\`
        
        Please provide:
        1. A clear description of what this Bicep template does
        2. List all parameters with their types, descriptions, and constraints
        3. List all resources being created with explanations
        4. List all outputs and their purposes
        5. Identify any best practices being followed or missing
        6. Suggest improvements for security, performance, or maintainability
        7. Identify any dependencies or prerequisites
        
        Format the response in markdown with clear sections.`;
        
            const response = await openai.chat.completions.create({
              model: "gpt-4o-mini",
              messages: [
                {
                  role: "system",
                  content: "You are an Azure infrastructure expert specializing in Bicep templates. Provide accurate, detailed, and helpful documentation for Infrastructure as Code."
                },
                {
                  role: "user",
                  content: prompt
                }
              ],
              max_tokens: 2000,
              temperature: 0.3
            });
        
            return response.choices[0].message.content;
          } catch (error) {
            console.error(`Error analyzing ${filePath}:`, error.message);
            return `## Error analyzing ${filePath}\n\nUnable to generate AI analysis: ${error.message}`;
          }
        }
        
        async function generateProjectDescription(bicepFiles) {
          try {
            const fileList = bicepFiles.map(f => f.path).join(', ');
            
            const prompt = `Based on these Bicep files in an Infrastructure as Code repository: ${fileList}
        
        Generate:
        1. A comprehensive project description explaining the overall infrastructure purpose
        2. Architecture overview of how the components work together
        3. Deployment scenarios and use cases
        4. Prerequisites and requirements
        5. Estimated costs and resource implications
        
        Keep it concise but informative, suitable for a README overview section.`;
        
            const response = await openai.chat.completions.create({
              model: "gpt-4o-mini",
              messages: [
                {
                  role: "system",
                  content: "You are an Azure solutions architect. Analyze Infrastructure as Code projects and provide clear, business-focused documentation."
                },
                {
                  role: "user",
                  content: prompt
                }
              ],
              max_tokens: 1000,
              temperature: 0.3
            });
        
            return response.choices[0].message.content;
          } catch (error) {
            console.error('Error generating project description:', error.message);
            return 'This repository contains Azure Infrastructure as Code templates written in Bicep for automated resource deployment.';
          }
        }
        
        async function main() {
          if (!process.env.OPENAI_API_KEY) {
            console.log('OpenAI API key not provided, skipping AI enhancement');
            return;
          }
        
          const bicepFiles = [];
          const bicepPattern = /\.bicep$/;
          
          function findBicepFiles(dir) {
            const files = fs.readdirSync(dir);
            
            files.forEach(file => {
              const fullPath = path.join(dir, file);
              const stat = fs.statSync(fullPath);
              
              if (stat.isDirectory() && !fullPath.includes('.git') && !fullPath.includes('node_modules')) {
                findBicepFiles(fullPath);
              } else if (bicepPattern.test(file)) {
                const content = fs.readFileSync(fullPath, 'utf8');
                bicepFiles.push({
                  path: fullPath,
                  content: content
                });
              }
            });
          }
          
          findBicepFiles('.');
          
          console.log(`Found ${bicepFiles.length} Bicep files`);
          
          // Generate project description
          const projectDescription = await generateProjectDescription(bicepFiles);
          fs.writeFileSync('.readme-temp/project-description.md', projectDescription);
          
          // Analyze each Bicep file
          let analysisContent = "## 📁 Bicep Files Analysis\n\n";
          
          for (const file of bicepFiles) {
            console.log(`Analyzing ${file.path}...`);
            const analysis = await analyzeBicepFile(file.path, file.content);
            analysisContent += `### ${file.path}\n\n${analysis}\n\n---\n\n`;
          }
          
          fs.writeFileSync('.readme-temp/analysis.md', analysisContent);
          console.log('AI analysis completed');
        }
        
        main().catch(console.error);
        EOF
        
        # Run AI analysis
        if [ -n "$OPENAI_API_KEY" ]; then
          echo "Running AI-enhanced analysis..."
          node .readme-temp/ai-analyzer.js
        else
          echo "OpenAI API key not provided, using basic analysis..."
          
          # Fallback to basic analysis
          find . -name "*.bicep" -not -path "./.git/*" > .readme-temp/bicep-files.txt
          
          echo "## Bicep Files Analysis" > .readme-temp/analysis.md
          echo "" >> .readme-temp/analysis.md
          
          while IFS= read -r file; do
            if [ -f "$file" ]; then
              echo "### File: $file" >> .readme-temp/analysis.md
              echo "" >> .readme-temp/analysis.md
              
              # Extract parameters
              echo "**Parameters:**" >> .readme-temp/analysis.md
              grep -n "^param " "$file" | head -10 >> .readme-temp/analysis.md || echo "No parameters found" >> .readme-temp/analysis.md
              echo "" >> .readme-temp/analysis.md
              
              # Extract outputs
              echo "**Outputs:**" >> .readme-temp/analysis.md
              grep -n "^output " "$file" | head -10 >> .readme-temp/analysis.md || echo "No outputs found" >> .readme-temp/analysis.md
              echo "" >> .readme-temp/analysis.md
              
              # Extract resources
              echo "**Resources:**" >> .readme-temp/analysis.md
              grep -n "^resource " "$file" | head -10 >> .readme-temp/analysis.md || echo "No resources found" >> .readme-temp/analysis.md
              echo "" >> .readme-temp/analysis.md
              
              echo "---" >> .readme-temp/analysis.md
              echo "" >> .readme-temp/analysis.md
            fi
          done < .readme-temp/bicep-files.txt
          
          echo "This repository contains Azure Infrastructure as Code templates written in Bicep for automated resource deployment." > .readme-temp/project-description.md
        fi

    - name: Generate README content
      run: |
        cat > README.md << 'EOF'
        # Infrastructure as Code - Bicep Repository
        
        [![Build Status](https://github.com/${{ github.repository }}/workflows/Generate%20Repository%20README/badge.svg)](https://github.com/${{ github.repository }}/actions)
        [![Last Updated](https://img.shields.io/github/last-commit/${{ github.repository }})](https://github.com/${{ github.repository }}/commits)
        
        > **Auto-generated README** - Last updated: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
        
        ## 📋 Overview
        
        This repository contains Azure Infrastructure as Code (IaC) templates written in Bicep. These templates help automate the deployment and management of Azure resources with best practices and consistent configurations.
        
        ## 🏗️ Repository Structure
        
        ```
        $(tree -I '.git|node_modules|.readme-temp' -a)
        ```
        
        ## 🚀 Quick Start
        
        ### Prerequisites
        
        - [Azure CLI](https://docs.microsoft.com/en-us/cli/azure/install-azure-cli) installed and configured
        - [Bicep CLI](https://docs.microsoft.com/en-us/azure/azure-resource-manager/bicep/install) installed
        - An active Azure subscription
        
        ### Basic Deployment
        
        ```bash
        # Login to Azure
        az login
        
        # Set your subscription
        az account set --subscription "your-subscription-id"
        
        # Create a resource group
        az group create --name "rg-your-project" --location "East US"
        
        # Deploy the main template
        az deployment group create \
          --resource-group "rg-your-project" \
          --template-file main.bicep \
          --parameters @parameters/dev.json
        ```
        
        ## 📁 Bicep Files
        
        EOF
        
        # Add file-specific documentation
        if [ -f ".readme-temp/analysis.md" ]; then
          cat .readme-temp/analysis.md >> README.md
        fi
        
        cat >> README.md << 'EOF'
        
        ## 📝 Parameter Examples
        
        ### Development Environment (`parameters/dev.json`)
        
        ```json
        {
          "$schema": "https://schema.management.azure.com/schemas/2019-04-01/deploymentParameters.json#",
          "contentVersion": "1.0.0.0",
          "parameters": {
            "environment": {
              "value": "dev"
            },
            "location": {
              "value": "eastus"
            },
            "appName": {
              "value": "myapp"
            },
            "skuName": {
              "value": "B1"
            },
            "skuCapacity": {
              "value": 1
            },
            "tags": {
              "value": {
                "Environment": "Development",
                "Project": "Sample Project",
                "CostCenter": "IT"
              }
            }
          }
        }
        ```
        
        ### Production Environment (`parameters/prod.json`)
        
        ```json
        {
          "$schema": "https://schema.management.azure.com/schemas/2019-04-01/deploymentParameters.json#",
          "contentVersion": "1.0.0.0",
          "parameters": {
            "environment": {
              "value": "prod"
            },
            "location": {
              "value": "eastus"
            },
            "appName": {
              "value": "myapp"
            },
            "skuName": {
              "value": "P1v2"
            },
            "skuCapacity": {
              "value": 3
            },
            "tags": {
              "value": {
                "Environment": "Production",
                "Project": "Sample Project",
                "CostCenter": "IT"
              }
            }
          }
        }
        ```
        
        ## 💻 Bicep Code Examples
        
        ### Basic Web App with App Service Plan
        
        ```bicep
        // Parameters
        @description('The name of the application')
        param appName string
        
        @description('The Azure region where resources will be deployed')
        param location string = resourceGroup().location
        
        @description('Environment name (dev, test, prod)')
        @allowed(['dev', 'test', 'prod'])
        param environment string
        
        @description('App Service Plan SKU')
        @allowed(['B1', 'B2', 'B3', 'S1', 'S2', 'S3', 'P1v2', 'P2v2', 'P3v2'])
        param skuName string = 'B1'
        
        @description('App Service Plan capacity')
        @minValue(1)
        @maxValue(10)
        param skuCapacity int = 1
        
        @description('Resource tags')
        param tags object = {}
        
        // Variables
        var appServicePlanName = 'asp-${appName}-${environment}'
        var webAppName = 'app-${appName}-${environment}'
        
        // Resources
        resource appServicePlan 'Microsoft.Web/serverfarms@2022-03-01' = {
          name: appServicePlanName
          location: location
          tags: tags
          sku: {
            name: skuName
            capacity: skuCapacity
          }
          kind: 'app'
        }
        
        resource webApp 'Microsoft.Web/sites@2022-03-01' = {
          name: webAppName
          location: location
          tags: tags
          properties: {
            serverFarmId: appServicePlan.id
            httpsOnly: true
            siteConfig: {
              minTlsVersion: '1.2'
              ftpsState: 'Disabled'
              http20Enabled: true
              appSettings: [
                {
                  name: 'ENVIRONMENT'
                  value: environment
                }
              ]
            }
          }
        }
        
        // Outputs
        @description('The URL of the deployed web application')
        output webAppUrl string = 'https://${webApp.properties.defaultHostName}'
        
        @description('The resource ID of the App Service Plan')
        output appServicePlanId string = appServicePlan.id
        
        @description('The resource ID of the Web App')
        output webAppId string = webApp.id
        ```
        
        ### Storage Account with Container
        
        ```bicep
        @description('Storage account name')
        @minLength(3)
        @maxLength(24)
        param storageAccountName string
        
        @description('Location for the storage account')
        param location string = resourceGroup().location
        
        @description('Storage account SKU')
        @allowed(['Standard_LRS', 'Standard_GRS', 'Standard_RAGRS', 'Premium_LRS'])
        param sku string = 'Standard_LRS'
        
        @description('Container name')
        param containerName string = 'data'
        
        resource storageAccount 'Microsoft.Storage/storageAccounts@2022-09-01' = {
          name: storageAccountName
          location: location
          sku: {
            name: sku
          }
          kind: 'StorageV2'
          properties: {
            accessTier: 'Hot'
            supportsHttpsTrafficOnly: true
            minimumTlsVersion: 'TLS1_2'
            allowBlobPublicAccess: false
          }
        }
        
        resource blobService 'Microsoft.Storage/storageAccounts/blobServices@2022-09-01' = {
          name: 'default'
          parent: storageAccount
        }
        
        resource container 'Microsoft.Storage/storageAccounts/blobServices/containers@2022-09-01' = {
          name: containerName
          parent: blobService
          properties: {
            publicAccess: 'None'
          }
        }
        
        output storageAccountId string = storageAccount.id
        output primaryEndpoints object = storageAccount.properties.primaryEndpoints
        ```
        
        ## 🔧 Deployment Scripts
        
        ### PowerShell Deployment Script
        
        ```powershell
        # deploy.ps1
        param(
            [Parameter(Mandatory=$true)]
            [string]$ResourceGroupName,
            
            [Parameter(Mandatory=$true)]
            [string]$Environment,
            
            [string]$Location = "East US",
            [string]$TemplateFile = "main.bicep"
        )
        
        # Login and set context
        Connect-AzAccount
        Set-AzContext -SubscriptionId "your-subscription-id"
        
        # Create resource group if it doesn't exist
        if (-not (Get-AzResourceGroup -Name $ResourceGroupName -ErrorAction SilentlyContinue)) {
            New-AzResourceGroup -Name $ResourceGroupName -Location $Location
            Write-Host "Created resource group: $ResourceGroupName"
        }
        
        # Deploy template
        $parametersFile = "parameters/$Environment.json"
        
        if (Test-Path $parametersFile) {
            New-AzResourceGroupDeployment `
                -ResourceGroupName $ResourceGroupName `
                -TemplateFile $TemplateFile `
                -TemplateParameterFile $parametersFile `
                -Verbose
        } else {
            Write-Error "Parameters file not found: $parametersFile"
        }
        ```
        
        ### Bash Deployment Script
        
        ```bash
        #!/bin/bash
        # deploy.sh
        
        set -e
        
        RESOURCE_GROUP_NAME=""
        ENVIRONMENT=""
        LOCATION="eastus"
        TEMPLATE_FILE="main.bicep"
        
        # Parse command line arguments
        while [[ $# -gt 0 ]]; do
          case $1 in
            -g|--resource-group)
              RESOURCE_GROUP_NAME="$2"
              shift 2
              ;;
            -e|--environment)
              ENVIRONMENT="$2"
              shift 2
              ;;
            -l|--location)
              LOCATION="$2"
              shift 2
              ;;
            *)
              echo "Unknown parameter: $1"
              exit 1
              ;;
          esac
        done
        
        # Validate required parameters
        if [ -z "$RESOURCE_GROUP_NAME" ] || [ -z "$ENVIRONMENT" ]; then
            echo "Usage: $0 -g <resource-group-name> -e <environment> [-l <location>]"
            exit 1
        fi
        
        # Create resource group if it doesn't exist
        az group create --name "$RESOURCE_GROUP_NAME" --location "$LOCATION"
        
        # Deploy template
        PARAMETERS_FILE="parameters/${ENVIRONMENT}.json"
        
        if [ -f "$PARAMETERS_FILE" ]; then
            az deployment group create \
                --resource-group "$RESOURCE_GROUP_NAME" \
                --template-file "$TEMPLATE_FILE" \
                --parameters "@$PARAMETERS_FILE"
        else
            echo "Error: Parameters file not found: $PARAMETERS_FILE"
            exit 1
        fi
        ```
        
        ## 🏷️ Best Practices
        
        ### Naming Conventions
        
        - **Resource Groups**: `rg-{project}-{environment}-{region}`
        - **Storage Accounts**: `st{project}{environment}{random}`
        - **App Service Plans**: `asp-{project}-{environment}`
        - **Web Apps**: `app-{project}-{environment}`
        - **Key Vaults**: `kv-{project}-{environment}`
        
        ### Parameter Guidelines
        
        1. Always provide descriptions for parameters
        2. Use appropriate constraints (`@allowed`, `@minValue`, `@maxValue`)
        3. Provide default values where sensible
        4. Group related parameters logically
        5. Use consistent naming patterns
        
        ### Security Best Practices
        
        - Enable HTTPS only for web applications
        - Use minimum TLS version 1.2
        - Disable public access where not required
        - Implement proper RBAC
        - Use managed identities where possible
        
        ## 🧪 Testing
        
        ### Validate Bicep Templates
        
        ```bash
        # Lint all Bicep files
        find . -name "*.bicep" -exec az bicep build --file {} \;
        
        # Validate deployment (what-if)
        az deployment group what-if \
          --resource-group "rg-test" \
          --template-file main.bicep \
          --parameters @parameters/dev.json
        ```
        
        ## 📚 Additional Resources
        
        - [Azure Bicep Documentation](https://docs.microsoft.com/en-us/azure/azure-resource-manager/bicep/)
        - [Bicep Best Practices](https://docs.microsoft.com/en-us/azure/azure-resource-manager/bicep/best-practices)
        - [Azure Resource Manager Templates](https://docs.microsoft.com/en-us/azure/azure-resource-manager/templates/)
        - [Azure CLI Reference](https://docs.microsoft.com/en-us/cli/azure/)
        
        ## 🤝 Contributing
        
        1. Fork the repository
        2. Create a feature branch: `git checkout -b feature/your-feature`
        3. Commit your changes: `git commit -am 'Add some feature'`
        4. Push to the branch: `git push origin feature/your-feature`
        5. Submit a pull request
        
        ## 📄 License
        
        This project is licensed under the MIT License - see the [LICENSE](LICENSE) file for details.
        
        ---
        
        **Note**: This README was automatically generated by the GitHub Actions workflow. Manual changes will be overwritten on the next workflow run.
        EOF

    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        if [ -n "$(git status --porcelain)" ]; then
          git add README.md
          git commit -m "docs: auto-update README.md with latest Bicep documentation"
          git push
        else
          echo "No changes to commit"
        fi

    - name: Cleanup
      run: rm -rf .readme-temp

    - name: Create Pull Request (if on feature branch)
      if: github.event_name == 'pull_request'
      uses: peter-evans/create-pull-request@v5
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: "docs: auto-update README.md with latest Bicep documentation"
        title: "Auto-update README.md"
        body: |
          This PR was automatically created by the README generation workflow.
          
          ## Changes
          - Updated README.md with latest Bicep file analysis
          - Added current repository structure
          - Updated timestamps
          
          Please review the changes and merge if appropriate.
        branch: auto-update-readme